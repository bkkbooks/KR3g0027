body:
  text: 發微論術數類三相宅相墓之屬提要臣等謹按發微論一卷宋蔡元定撰元定字季通建陽人遊於朱子之門慶元中偽學禁起坐黨籍竄道州卒於謫所後韓侂胄敗追贈廸功郎賜諡文節事蹟具宋史儒林𫝊元定之學旁渉術數而尤究心於地理是篇即其相地之書大㫖主於地道一剛一柔以明動静觀聚散審向背觀雌雄辨強弱分順逆識生死察微著究分合别浮沉定淺深正饒減詳趨避知裁成凡十有四例逓為推闡而以原感應一篇明福善禍淫之理終焉葢術家惟論其數元定則推究以儒理故其説能不悖於道如云水本動欲其静山本静欲其動聚散言乎其大勢向背言乎其性情知山川之大勢黙定於數里之外而後能推順逆於咫尺微茫之間善觀者以有形察無形不善觀者以無形蔽有形皆能抉摘精奥非方技之士支離誕漫之比也地理大全亦載此書題曰蔡牧堂撰考元定父發自號牧堂老人則其書當出自發手或後人誤属之元定亦未可知然勘核諸本題元定者為多今故以元定之名著於録焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:cb46ce95873f7bb7129f6e8709854e501fe771210c8245a0bc926d14a360b420
