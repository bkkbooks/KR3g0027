front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3g0027_WYG_001-1a, image: WYG0808/WYG0808-0190c.png}
body:
  text: 發微論宋蔡元定撰剛柔篇易曰立天之道曰隂與陽邵氏曰立地之道剛柔盡之矣故地理之要莫尚於剛柔剛柔者言乎其體質也天地之初固若漾沙之勢未有山川之可言也既而風氣相摩水土相蕩則剛者屹而獨存柔者淘而漸去於是乎山川形焉山體剛而用柔故髙聳而凝定水體柔而用剛故卑下而流行此又剛中有柔柔中有剛也邵氏以水為太柔火為太剛土為少柔石為少剛所謂地之四象也水則人身之血故為太柔火則人身之氣故為太剛土則人身之肉故為少柔石則人身之骨故為少剛合水火土石而為地猶合血氣骨肉而為人近取諸身逺取諸物無二理也若細推之凡涸燥者皆剛夷坦者皆柔然涸燥之中有夷坦夷坦之中有涸燥則是剛中有柔柔中有剛也凡强急者皆剛緩弱者皆柔然强急之中有緩弱緩弱之中有强急則是柔中有剛剛中有柔也自此以往儘推無窮知者觀之思過半矣動靜篇其次莫若明動靜動靜者言乎其變通也夫槩天下之理欲向動中求靜靜中求動不欲靜愈靜動愈動古語云水本動欲其靜山本靜欲其動此逹理之言也故山以靜為常是謂無動動則成龍矣水以動為常是為無靜靜則結地矣故成龍之山必踴躍翔舞結地之水必灣環悠揚若其偃硬側勒衝激牽射則動不離動靜不離靜山水之不融結者也然一動一靜互相循環山亦有動極而靜水亦有靜極而動不可執一而論又在人融化之為妙也聚散篇其次莫若觀聚散聚散者言乎其大勢也歷觀古人之葬大抵穴多竒怪非好怪也良由得山水之正則怪穴所為常也今人於大聚之中或乃拘于形穴而不葬矣然有大勢之聚散有穴中之聚散大勢之聚散見乎逺穴中之聚散見乎近是二者有相須之道焉向背篇其次莫若審向背向背者言乎其情性也夫地理與人事不逺人之情性不一而向背之道可見其向我者必有周旋相與之意其背我者必有厭棄不顧之狀雖或暫焉矯飾而真態自然不可掩也故觀地者必觀其情之向背向者不難見凡相對如君臣相待如賔主相親相愛如兄弟骨肉此皆向之情也背者亦不難見凡相視如讐敵相拋如路人相忌如嫉寃逆寇此皆背之情也觀形貌者得其僞觀情性者得其真向背之理明而吉凶禍福之機灼然故嘗謂地理之要不過山水向背而已矣雌雄篇其次又當看雌雄雌雄者言乎其配合也夫孤隂不生獨陽不成天下之物莫不要相配對地理家以雌雄言之大槩不過相對待之理何以言之山屬隂水屬陽故山水相對有雌雄而山之與水各有雌雄陽龍取隂穴隂龍取陽穴此龍穴相對有雌雄陽山取隂為對隂山取陽為對此主客相對有雌雄也其地融結則雌雄必合龍穴砂水左右主客必相登對若單雌單雄不相登對雖或結地必非真造化也經曰雌雄相喜天地交通又曰雌雄不顧不勞看古人多以此為要妙然亦天地自然之理也强弱篇其次又當辨强弱强弱者言乎其禀氣也夫天下之理中而已矣太剛則折故須濟之以柔太柔則弱故須濟之以剛剛柔相濟中道得矣論地理者必須察其禀氣禀偏於柔故其性緩禀偏於剛故其性急禀剛性急此宜穴於緩處若復穴於强急之處則必有絶宗之禍禀柔性緩此宜穴於急處若復穴於弱緩之處則必有冷退之患强來强下則傷龍弱來弱下則脫脉故立穴之法大概欲得酌中恰好底道理不得倚於一偏才偏便生出病來然非權衡有定則亦未易語也順逆篇其次又當分順逆順逆者言乎其去來也其來者何水之所發山之所起是也其去者何水之所趨山之所止是也知來去而知順逆者有矣不知來去而知順逆者未之有也夫順逆二路如盲如聾自非灼然有見鮮不以逆為順以順為逆者矣要知順山順水者順也所謂來處來者是也逆山逆水者逆也所謂去處去者是也立穴之法要順中取逆逆中取順此一定之理不可改易若又推而廣之則脉有順逆龍有順逆順龍之穴結必逆逆龍之穴結必順此亦山川自然之勢也大抵論逆順者要知山川之大勢默定于數里之外而後能推順逆於咫尺微茫之間否則黑白混淆以逆為順以順為逆者多矣生死篇其次又當識生死生死者言乎其取舍也夫千里來龍不過一席之地倘非以生死别之則何所决擇哉生死之說非一端大槩有氣者為生無氣者為死脉活動者為生粗硬者為死龍勢推左則左為生右為死龍勢推右則右為生左為死又有瘦中取肉則瘦處死而肉處生飽中取饑則饑處生而飽處死如此之類在人細推之生則在所取死則在所舍取舍明而後穴法定穴法定而後禍福應若生死難辨取舍何當則非逹造化矣微著篇其次又當察微著微著者言乎其氣脉也夫氣無形者也屬乎陽脉有形者也屬乎隂陽清隂濁故氣微而脉著然氣不自成必依脉而立脉不自為必因氣而成蓋有脉而無氣者有矣未有無脉而有氣者也經曰氣乘風散脉遇水止無脉無氣者水害之也有脉無氣者風乘之也善觀氣脉者以有形察無形不善觀者以無形蔽有形蓋無形只在有形之內但知者所見實故於粗淺而得精微愚者所見昏故於荒忽茫昧而不曉豈知四水交流則有脉八風不動則有氣此有目者所共見有心者所共知而術之至要初不外是也分合篇其次又當究分合分合者言乎其出沒也夫脉之為脉非徒然而生頓然而有其出也必有自然之來則有分水以導之其沒也必有所止則有合水以界之郭氏云地有吉氣隨土而起支有止氣隨水而比又曰支之所起氣隨而始支之所發氣隨而鍾此古人論氣脉之源流也氣隨土而起故脉行必有脊氣隨水而比故送脉必有水氣起于支之始故上有分脉鍾于支之終故下有合有合無分則其來不真為其內無生氣之可接也有分無合則其止不明為外無堂氣之可受也有分有合則有來有止有出有沒則龍穴融結的定無疑然後為全氣之地也然有大分合小分合真地融結則有三分三合穴前後一分合起主龍虎所交二分合祖龍至山水大會三分合也小合則為小明堂大合則為大明堂合於龍虎內則為內明堂合於龍虎外則為外明堂各不相亂如此是又不可不知也浮沉論其次又當别浮沉浮沉者言乎其表裏也夫脉有隂陽故有浮沉隂脉常見乎表所謂浮也陽脉常收乎裏所謂沉也大抵地理家察脉與醫家察脉無異善醫者察脉之隂陽而用藥善地理者察脉之浮沉而立穴其理一也夫三隂從天生以其隂根于陽也故隂脉必上小而下大其出口也必尖三陽從地出以其陽根於隂也故陽脉必上大而下小其出口也必圓後之觀脉者不必問其何如但口尖者皆隂其脉浮於表口圓者皆陽其脉沉于裏此一定不易之法若又推而廣之則凸者脉浮凹者脉沉微細者脉浮粗重者脉沉衆髙一低者脉浮衆低一髙者脉沉以此相乘除則隂陽之理得矣淺深篇其次又當定淺深淺深者言乎其凖的也夫淺深得乘風水自成故卜地者必以淺深為凖的宜淺而深則氣從上過宜深而淺則氣從下過雖得吉地而效不應者為此故也大概先觀來脉之隂陽次看四山之從佐且如脉入首强作穴凹出口圓此皆脉浮而穴陽宜淺來脉入首弱作穴凸出口尖此皆脉沉而穴隂宜深故曰淺深得乘風水自成深淺之法多端至理莫過於是也切要辨認入首隂陽蝦鬚界合明白若當深而淺當淺而深差於咫尺之間反吉為凶矣經曰地吉葬凶與棄尸同正此義也世俗裝卦例論九星白法以定寸尺者大謬也饒減篇其次又當正饒減饒減者言乎其消長也夫龍虎左右各有饒減然饒減龍虎者何哉此消長隂陽之義也饒減之法大槩以先到為主龍山先到則減龍而饒虎其穴必居左虎山先到則減虎而饒龍其穴必居右蓋山水關鎖必須交固然後氣全穴左則取左山為關須右邊水過宫鎖斷所謂隂鎖陽關也穴右則取右山為關須左邊水過宮鎖斷所謂陽鎖隂關也惟有朝山朝水則順關順鎖不妨若橫水過宫則逆關逆鎖方善斷不可改易也毫釐差謬禍福大逺可不審哉趨避篇其次又當詳趨避趨避者言乎其决擇也夫天下之道二吉凶善惡常相半不能皆吉也而必有凶不能皆善也而必有惡故人之所遭有不齊也既所遭之不齊則必有以處趨吉避凶去惡從善是也地理亦然夫山川之所鍾不能皆全純粹之氣不能無所駁雜既不能無所駁雜則妍媸醜好紛然前陳亦其宜耳然而山川之變態不一咫尺之移轉頓殊或低視而醜或髙視而好或左視而妍或右視而媸或秀氣聚下而髙則否或情意偏右而左則虧裁成篇其次又當知裁成裁成者言乎其人事也夫人不天不因天不人不成自有宇宙即有山川數不加多用不加少必天生自然而後定則天地之造化亦有限矣是故山川之融結在天而山水之裁成在人或過焉吾則裁其過或不及焉吾則益其不及使適於中截長補短損髙益下莫不有當然之理其始也不過目力之巧工力之具其終也奪神功改天命而人與天無間矣故善者盡其當然而不害其為自然不善者泥乎自然卒不知其所當然所以道不虛行存乎其人也感應篇其次又當原感應感應者言乎其天道也夫天道不言而響應福善禍淫皆是物也諺云隂地好不如心地好此善言感應之理也是故求地者必以積德為本若其德果厚天必以吉地應之是所以福其子孫者心也而地之吉亦將以符之也其惡果盈天必以凶地應之是所以禍其子孫者亦本於心也而地之凶亦將以符之也蓋心者氣之主氣者德之符天未嘗有心於人而人之一心一氣感應自相符合耳郭氏云吉凶感應鬼神及人人於先骸固不可不擇其所而安厝之然不修其本惟末是圖則不纍祖宗者寡矣况欲有以福其子孫哉地理之微吾既發明之故述此於篇末以明天道之不可誣人心之所當謹噫觀是書者其知所戒哉發微論
